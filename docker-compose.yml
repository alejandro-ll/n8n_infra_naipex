version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: naipex-n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=workflows.nxops.cloud
      - N8N_PROTOCOL=https
      - N8N_PORT=5678
      - WEBHOOK_URL=https://workflows.nxops.cloud/
      - N8N_SECURE_COOKIE=true
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - N8N_PAYLOAD_SIZE_MAX=64
      - NODES_EXCLUDE=[]
      - NODE_FUNCTION_ALLOW_BUILTIN=crypto
      - NODE_FUNCTION_ALLOW_EXTERNAL=jszip
      - N8N_DEFAULT_BINARY_DATA_MODE=default
    volumes:
      - ./data/n8n:/home/node/.n8n
      - /home/operador/proyectos/robot_kpi:/home/operador/proyectos/robot_kpi
      - /home/operador/proyectos/robot_create_account:/home/operador/proyectos/robot_create_account
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 2g
    cpus: 2
    networks:
      - internal
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: naipex-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    mem_limit: 1g
    cpus: 1
    networks:
      - internal
    # NO exponemos puertos al host, solo accesible desde la red interna

  nginx:
    image: nginx:alpine
    container_name: naipex-nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/certs:/etc/nginx/certs:ro
    depends_on:
      - n8n
    networks:
      - internal

networks:
  internal:
