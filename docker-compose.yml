version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: naipex-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin_change_me_123
      - WEBHOOK_URL=http://157.180.47.227:5678/
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - N8N_PAYLOAD_SIZE_MAX=64
    volumes:
      - ./data/n8n:/home/node/.n8n
      - /home/operador/proyectos:/home/node/proyectos
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 2g
    cpus: 2
